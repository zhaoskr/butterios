<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Butterios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="announcement">Butterios Checkout Demo | For showcase only</header>
  <nav class="nav">
    <div class="brand">BUTTERIOS</div>
    <div class="nav-links">
      <a href="./index.html">Store Home</a>
      <a href="./cart.html">Back to Cart</a>
    </div>
  </nav>

  <main class="flow-main">
    <section class="flow-card">
      <h1>Checkout</h1>
      <form id="checkoutForm" class="checkout-form">
        <label>Full Name<input required type="text" placeholder="John Carter" /></label>
        <label>Email<input required type="email" placeholder="john@email.com" /></label>
        <label>Phone<input required type="tel" placeholder="(555) 123-4567" /></label>
        <label>Street Address<input required type="text" placeholder="123 Main St" /></label>
        <div class="form-row">
          <label>City<input required type="text" placeholder="Austin" /></label>
          <label>State<input required type="text" placeholder="TX" /></label>
          <label>ZIP<input required type="text" placeholder="73301" /></label>
        </div>

        <h3>Payment Method (Display)</h3>
        <label class="radio-line"><input type="radio" name="pay" checked /> Credit Card (mock)</label>
        <label class="radio-line"><input type="radio" name="pay" /> PayPal (mock)</label>

        <button class="checkout-btn" type="submit">Place Demo Order</button>
      </form>
    </section>

    <aside class="flow-card summary-card">
      <h2>Order Summary</h2>
      <div id="checkoutItems" class="mini-items"></div>
      <div class="summary-row"><span>Subtotal</span><strong id="ckSubtotal">$0.00</strong></div>
      <div class="summary-row"><span>Shipping</span><strong id="ckShipping">$0.00</strong></div>
      <div class="summary-row"><span>Tax (8%)</span><strong id="ckTax">$0.00</strong></div>
      <div class="summary-row total"><span>Total</span><strong id="ckTotal">$0.00</strong></div>
    </aside>
  </main>

  <script src="./store-data.js"></script>
  <script src="./checkout.js"></script>
</body>
</html>
