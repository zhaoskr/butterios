<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | Butterios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="announcement">Butterios Demo Flow | No real payment is processed</header>
  <nav class="nav">
    <div class="brand">BUTTERIOS</div>
    <div class="nav-links">
      <a href="./index.html">Continue Shopping</a>
      <a href="./checkout.html">Checkout</a>
    </div>
  </nav>

  <main class="flow-main">
    <section class="flow-card">
      <h1>Your Shopping Cart</h1>
      <p class="small">Adjust quantity and continue to checkout.</p>
      <div id="cartPageItems" class="cart-items"></div>
    </section>

    <aside class="flow-card summary-card">
      <h2>Order Summary</h2>
      <div class="summary-row"><span>Subtotal</span><strong id="sumSubtotal">$0.00</strong></div>
      <div class="summary-row"><span>Shipping</span><strong id="sumShipping">$0.00</strong></div>
      <div class="summary-row"><span>Tax (8%)</span><strong id="sumTax">$0.00</strong></div>
      <div class="summary-row total"><span>Total</span><strong id="sumTotal">$0.00</strong></div>
      <a class="checkout-btn link-btn" href="./checkout.html">Proceed to Checkout</a>
    </aside>
  </main>

  <script src="./store-data.js"></script>
  <script src="./cart.js"></script>
</body>
</html>
